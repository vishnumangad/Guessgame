<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .game-container {
            height:50%;
            text-align: center;
            background-color: #0f0;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 4px 4px 8px black;
            border:2px double grey;
           
        }
        h1 {
            text-decoration: underline;
            margin-bottom: 5%;
            font-size: 34px;
            color:honeydew;
        }
        input {
           
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
            width: 60%;
            border: 2px solid #ccc;
            border-radius: 5px;
        }
        
        .message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        button {
  background-color: #4CAF50;
  color: #fff;
  font-size:16px;
  margin-top:15px;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover {
  transform: rotate(360deg);
  background-color: #45a049;
}
details{
      margin-top:10px;
      
}
    </style>
     <script>
        // Generate a random number between 1 and 100
        const randomNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;

        function checkGuess() {
            const userGuess = parseInt(document.getElementById('userGuess').value);
            const messageElement = document.getElementById('message');
            attempts++;

            // Check if the input is a valid number
            if (isNaN(userGuess)) {
                messageElement.textContent = "Please enter a valid number!";
                messageElement.style.color = "red";
                return;
            }

            // Check the guess against the random number
            if (userGuess < randomNumber) {
                messageElement.textContent = `Your guess is too low. Try again!`;
                messageElement.style.color = "red";
                messageElement.style.fontSize = "25px";
            } else if (userGuess > randomNumber) {
                messageElement.textContent = `Your guess is too high. Try again!`;
                messageElement.style.color = "red";
                messageElement.style.fontSize = "25px";
            } else {
                messageElement.textContent = `Congratulations! You guessed the number in ${attempts} attempts.`;
                messageElement.style.color = "White";
                messageElement.style.fontSize = "25px";
                messageElement.style.textShadow = "5px 5px 10px gold";
            }

            // Clear the input field after submitting a guess
            document.getElementById('userGuess').value = '';
        }
    </script>
</head>
<body>
    <div class="game-container">
        <h1>Guess the Number Game</h1>
        <p style=" margin-bottom:5%;font-size: 25px;">I'm thinking of a number between 1 and 100. Can you guess what it is?</p>
        <input type="number" id="userGuess" placeholder="Enter a number..." />
        <button onclick="checkGuess()">Submit Guess</button>
        <div class="message" id="message"></div>
    </div>
<details>
<summary>Click to clear your doubts</summary>
<ul type="square">
<li>If it tells your guess is too high,then decrease the number you are giving as input.</li>
<li>If it tells your guess is too low,then increase the number you are giving as input.</li>
</ul>
 </details>  
</body>
</html>
